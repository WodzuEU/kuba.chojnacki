<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuba Chojnacki | Page not found</title>
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <!-- self-contained: GitHub Pages serves this for any missing path, so it
         must not depend on relative assets. brand basics inlined below. -->
    <style>
        :root {
            --bg:#ffffff; --ink:#1a1a18; --mid:#6f6f6a; --rule:#111;
            --serif:"EB Garamond",Georgia,serif; --sans:"Montserrat",sans-serif;
            --pad:clamp(1.5rem,4vw,4rem);
        }
        *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:var(--bg); color:var(--ink); font-family:var(--sans);
            font-size:14px; line-height:1.6; -webkit-font-smoothing:antialiased;
            min-height:100vh; min-height:100svh; display:flex; flex-direction:column;
        }
        a { color:inherit; text-decoration:none; }
        header {
            display:flex; align-items:center; justify-content:space-between;
            padding:0.9rem var(--pad); border-bottom:1px solid var(--rule);
        }
        .logo {
            font-family:var(--serif); font-size:1.1rem; letter-spacing:0.08em;
            text-transform:uppercase; color:var(--ink);
        }
        nav a {
            font-family:var(--serif); font-size:1.1rem; text-transform:lowercase;
            color:var(--ink); margin-left:2rem; transition:opacity .25s;
        }
        nav a:hover { opacity:.45; }
        main {
            flex:1; display:flex; flex-direction:column; justify-content:center;
            align-items:flex-start; gap:1.4rem; padding:clamp(2.5rem,6vw,6rem) var(--pad);
        }
        .label {
            font-family:var(--sans); font-size:11px; font-weight:500;
            letter-spacing:0.18em; text-transform:uppercase; color:var(--mid);
        }
        h1 {
            font-family:var(--serif); font-weight:400;
            font-size:clamp(2rem,5vw,3.5rem); line-height:1.1;
            text-transform:lowercase; max-width:13em;
        }
        .back {
            font-family:var(--serif); font-style:italic; font-size:1.2rem;
            text-transform:lowercase; text-decoration:underline;
            text-underline-offset:3px; transition:opacity .2s;
        }
        .back:hover { opacity:.45; }
        @media (max-width:520px) {
            .logo { font-size:0.8rem; letter-spacing:0.1em; }
            nav a { font-size:0.95rem; margin-left:0.9rem; }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">Kuba Chojnacki</a>
        <nav>
            <a href="/#works">works</a>
            <a href="/#about">about</a>
            <a href="/#contact">contact</a>
            <a href="/newsletter/">newsletter</a>
        </nav>
    </header>
    <main>
        <span class="label">404</span>
        <h1>this page has slipped off the canvas.</h1>
        <a class="back" href="/">return to the paintings</a>
    </main>
</body>
</html>
