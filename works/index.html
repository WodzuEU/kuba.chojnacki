<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuba Chojnacki | Works</title>
    <meta name="description" content="Paintings by Kuba Chojnacki — the Atmosphere and Chromatic collections. Gradient works on raw canvas, available to collectors and galleries.">
    <link rel="canonical" href="https://kubachojnacki.com/works/">
    <meta property="og:title" content="Kuba Chojnacki | Works">
    <meta property="og:description" content="The Atmosphere and Chromatic collections — gradient paintings on raw canvas.">
    <meta property="og:image" content="https://kubachojnacki.com/IMAGES/works/03-atmosphere-maroon-khaki-hero.jpg">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kubachojnacki.com/works/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header id="site-header">
        <h1 class="logo"><a href="../">Kuba Chojnacki</a></h1>
        <nav>
            <a href="./" aria-current="page">Works</a>
            <a href="../about/">About</a>
            <a href="../contact/">Contact</a>
        </nav>
    </header>

    <main class="works-page">
        <section id="works"><!-- collections are rendered here from js/data.js --></section>
    </main>

    <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Artwork detail">
        <button class="lightbox-btn lb-close" id="lb-close-btn" aria-label="Close lightbox">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
        <button class="lightbox-btn lb-prev" id="lb-prev-btn" aria-label="Previous artwork">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="Fullscreen artwork">
            <div class="lightbox-info">
                <div>
                    <h3 id="lb-title" class="lb-title"></h3>
                    <div id="lb-price" class="lb-price"></div>
                    <div id="lb-status" class="lb-status hidden"></div>
                    <div id="lb-specs" class="lb-specs"></div>
                </div>
                <div class="lb-inquiry-section" id="lb-inquiry-section">
                    <p class="purchase-info">For inquiries please use email or instagram direct message.</p>
                    <a id="lb-inquire-mail" href="mailto:chojnacki.studio@gmail.com" class="lb-submit">Inquire via email</a>
                    <a href="https://instagram.com/chojnacki.studio" target="_blank" rel="noopener" class="lb-submit">Inquire via instagram</a>
                    <div class="lb-extra">
                        <p>Certificate of authenticity included.</p>
                        <p>Shipping worldwide.</p>
                    </div>
                </div>
            </div>
        </div>
        <button class="lightbox-btn lb-next" id="lb-next-btn" aria-label="Next artwork">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
    </div>

    <script>window.ROOT = '../';</script>
    <script src="../js/data.js"></script>
    <script src="../js/site.js"></script>
</body>
</html>
